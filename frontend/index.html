<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>P4H MedBot — Oberhausen</title>
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <!-- ── Sidebar ─────────────────────────────────────────────────────────── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <span class="logo-icon">🏥</span>
        <div>
          <span class="logo-text">P4H MedBot</span>
          <span class="logo-sub">Oberhausen</span>
        </div>
      </div>
    </div>

    <div class="lang-selector">
      <div class="lang-label">Language / Sprache</div>
      <div class="lang-buttons">
        <button class="lang-btn active" data-lang="en" onclick="setLang('en')">🇬🇧 EN</button>
        <button class="lang-btn" data-lang="de" onclick="setLang('de')">🇩🇪 DE</button>
        <button class="lang-btn" data-lang="tr" onclick="setLang('tr')">🇹🇷 TR</button>
        <button class="lang-btn" data-lang="uk" onclick="setLang('uk')">🇺🇦 UK</button>
      </div>
    </div>

    <div class="quick-actions">
      <div class="qa-label">Quick Actions</div>
      <button class="qa-btn emergency" onclick="quickMessage('EMERGENCY — I need help now! Call ambulance!')">
        🚨 Emergency
      </button>
      <button class="qa-btn" onclick="quickMessage('Find me a doctor in Oberhausen')">
        👨‍⚕️ Find a Doctor
      </button>
      <button class="qa-btn" onclick="quickMessage('What are my health insurance rights?')">
        📋 Insurance Rights
      </button>
      <button class="qa-btn" onclick="quickMessage('Where is the nearest hospital?')">
        🏥 Nearest Hospital
      </button>
      <button class="qa-btn" onclick="quickMessage('I am a refugee. What health services can I access?')">
        🌍 Migrant Health
      </button>
      <button class="qa-btn" onclick="quickMessage('Where is the nearest pharmacy?')">
        💊 Pharmacy
      </button>
    </div>

    <div class="emergency-strip">
      <div class="em-title">🚨 Emergency Numbers</div>
      <div class="em-row"><span>Ambulance / Emergency</span><strong>112</strong></div>
      <div class="em-row"><span>Police</span><strong>110</strong></div>
      <div class="em-row"><span>Doctor on Call</span><strong>116 117</strong></div>
      <div class="em-row"><span>Poison Control</span><strong>0228 19240</strong></div>
      <div class="em-row"><span>Mental Health Crisis</span><strong>0800 111 0 111</strong></div>
    </div>

    <div class="sidebar-footer">
      <button class="clear-btn" onclick="clearChat()">🗑️ Clear Chat</button>
      <div class="session-id" id="session-display"></div>
    </div>
  </aside>

  <!-- ── Main Chat ───────────────────────────────────────────────────────── -->
  <main class="chat-container">
    <header class="chat-header">
      <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">☰</button>
      <div class="header-info">
        <h1>P4H MedBot</h1>
        <span class="header-sub">Multilingual Medical Assistant · DE | EN | TR | UK</span>
      </div>
      <div class="status-dot" id="statusDot" title="System status"></div>
    </header>

    <div class="messages" id="messages">
      <!-- Welcome message injected by JS -->
    </div>

    <!-- Agent indicator -->
    <div class="agent-indicator" id="agentIndicator" style="display:none">
      <span id="agentText">Processing...</span>
    </div>

    <div class="input-area">
      <div class="input-wrapper">
        <textarea
          id="userInput"
          class="user-input"
          placeholder="Ask me anything about health, doctors, or your rights... (DE | EN | TR | UK)"
          rows="1"
          maxlength="2000"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <span id="sendIcon">➤</span>
        </button>
      </div>
      <div class="input-footer">
        <span class="char-count" id="charCount">0 / 2000</span>
        <span class="stream-toggle">
          <label>
            <input type="checkbox" id="streamMode" checked />
            Streaming
          </label>
        </span>
      </div>
    </div>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
